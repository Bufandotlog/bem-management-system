; ============================================================
; PHP-FPM Pool Config - BPM ASTAWIDYA Production
; Dioptimasi untuk RAM rendah (1GB VPS)
; ============================================================

[www]
user  = www-data
group = www-data

; Listen via TCP (untuk Docker, mudah di-reach dari nginx)
listen = 0.0.0.0:9000

; ── Process Manager ─────────────────────────────────────────
; 'dynamic' = spawn worker sesuai kebutuhan (hemat RAM)
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500

; ── Status & Ping endpoint (untuk monitoring) ────────────────
pm.status_path = /fpm-status
ping.path      = /fpm-ping
ping.response  = pong

; ── Logging ──────────────────────────────────────────────────
access.log          = /proc/self/fd/2
slowlog             = /tmp/php-fpm-slow.log
request_slowlog_timeout = 10s

; ── Error handling ───────────────────────────────────────────
catch_workers_output = yes
php_admin_value[error_log]   = /var/www/html/logs/php_error.log
php_admin_flag[log_errors]   = on
php_admin_value[memory_limit] = 128M

; ── Security ──────────────────────────────────────────────────
security.limit_extensions = .php
