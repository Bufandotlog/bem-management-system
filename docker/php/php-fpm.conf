; ============================================================
; PHP-FPM Pool Config - BEM ASTAWIDYA Production
; Dioptimasi untuk RAM rendah (1GB VPS)
; ============================================================

[www]
user  = www-data
group = www-data

; Listen via TCP (untuk Docker, mudah di-reach dari nginx)
listen = 0.0.0.0:9000

; ── Process Manager ─────────────────────────────────────────
; 'dynamic' = spawn worker sesuai kebutuhan (hemat RAM)
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500

; ── Status & Ping endpoint (untuk monitoring) ────────────────
pm.status_path = /fpm-status
ping.path      = /fpm-ping
ping.response  = pong

; ── Logging ──────────────────────────────────────────────────
access.log          = /proc/self/fd/2
slowlog             = /tmp/php-fpm-slow.log
request_slowlog_timeout = 10s

; ── Error handling ───────────────────────────────────────────
catch_workers_output = yes
php_admin_value[error_log]   = /var/www/html/logs/php_error.log
php_admin_flag[log_errors]   = on
php_admin_value[memory_limit] = 128M

; ── Environment ──────────────────────────────────────────────
; clear_env = yes (default, aman) menghapus semua env vars Docker.
; Kita whitelist variabel yang dibutuhkan PHP secara eksplisit.
; Ini mencegah credential leak ke child process sekaligus memastikan
; PHP tetap bisa membaca konfigurasi yang diperlukan.
clear_env = yes

; App config
env[APP_ENV] = $APP_ENV
env[BASE_URL] = $BASE_URL
env[DEBUG_TOKEN] = $DEBUG_TOKEN

; Database
env[DB_CONNECTION] = $DB_CONNECTION
env[DB_HOST] = $DB_HOST
env[DB_PORT] = $DB_PORT
env[DB_NAME] = $DB_NAME
env[DB_USER] = $DB_USER
env[DB_PASS] = $DB_PASS

; Cloudflare Turnstile (CAPTCHA)
env[TURNSTILE_SITE_KEY] = $TURNSTILE_SITE_KEY
env[TURNSTILE_SECRET_KEY] = $TURNSTILE_SECRET_KEY

; S3 Object Storage
env[STORAGE_METHOD] = $STORAGE_METHOD
env[S3_ENDPOINT] = $S3_ENDPOINT
env[S3_REGION] = $S3_REGION
env[S3_ACCESS_KEY_ID] = $S3_ACCESS_KEY_ID
env[S3_SECRET_ACCESS_KEY] = $S3_SECRET_ACCESS_KEY
env[S3_BUCKET] = $S3_BUCKET
env[S3_PUBLIC_URL] = $S3_PUBLIC_URL

; ── Security ──────────────────────────────────────────────────
security.limit_extensions = .php
