; ============================================================
; PHP Configuration - BEM ASTAWIDYA Production
; Dioptimasi untuk VPS 1GB RAM
; ============================================================

[PHP]
; ── Umum ────────────────────────────────────────────────────
expose_php          = Off
short_open_tag      = Off
max_execution_time  = 120
max_input_time      = 90
memory_limit        = 128M
error_reporting     = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors      = Off
display_startup_errors = Off
log_errors          = On
error_log           = /var/www/html/logs/php_error.log

; ── Upload ───────────────────────────────────────────────────
file_uploads        = On
upload_max_filesize = 32M
post_max_size       = 35M
max_file_uploads    = 20

; ── Session (simpan di filesystem) ──────────────────────────
session.save_handler   = files
session.save_path      = /tmp/php-sessions
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_secure  = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1

; ── Date/Timezone ────────────────────────────────────────────
date.timezone = Asia/Jakarta

; ── OPcache (wajib ON untuk production!) ────────────────────
opcache.enable           = 1
opcache.enable_cli       = 0
opcache.memory_consumption = 64
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq  = 60
opcache.fast_shutdown    = 1
opcache.validate_timestamps = 0
