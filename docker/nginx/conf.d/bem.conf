# ============================================================
# Nginx Virtual Host - BEM ASTAWIDYA
# Domain: bembudiutomo.my.id
# ============================================================

# ── Redirect HTTP → HTTPS ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bembudiutomo.my.id www.bembudiutomo.my.id;

    # Digunakan untuk Certbot challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect semua traffic ke HTTPS (canonical non-www)
    location / {
        return 301 https://bembudiutomo.my.id$request_uri;
    }
}

# ── Redirect HTTPS www → HTTPS non-www ───────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.bembudiutomo.my.id;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/bembudiutomo.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bembudiutomo.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://bembudiutomo.my.id$request_uri;
}

# ── Main HTTPS Server Block ─────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name bembudiutomo.my.id;

    # ── SSL Certificates (Let's Encrypt) ────────────────────
    ssl_certificate     /etc/letsencrypt/live/bembudiutomo.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bembudiutomo.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Document Root & Index ────────────────────────────────
    root  /var/www/html;
    index index.php index.html;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/bem_access.log main;
    error_log  /var/log/nginx/bem_error.log warn;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: http: https:; frame-src 'self' https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com;" always;

    # ── Rate Limiting ─────────────────────────────────────────
    # Login page: 5 request per menit per IP
    location = /admin/login.php {
        limit_req zone=login burst=3 nodelay;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PHP_VALUE "upload_max_filesize=32M \n post_max_size=32M";
    }

    # ── Static Files (cache agresif) ─────────────────────────
    location /assets/ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    location /uploads/ {
        # Blokir eksekusi PHP di dalam uploads (security!)
        location ~* \.php$ {
            deny all;
            return 403;
        }
        expires    7d;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
    }

    # ── Main PHP Handler ─────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        # Cegah Nginx mengeksekusi PHP dari request yang mencurigakan
        try_files $uri =404;

        # Kirim ke container PHP-FPM
        fastcgi_pass  app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;

        # Timeout yang lebih panjang (untuk generate dokumen besar)
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;

        # Upload size
        fastcgi_param PHP_VALUE "upload_max_filesize=32M \n post_max_size=32M";
    }

    # ── Blokir Akses ke File Sensitif ────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    location ~ ^/(config|includes|logs|databases|scratch|docker|\.git)/ {
        deny all;
        return 404;
    }

    location = /.env {
        deny all;
        return 404;
    }

    location = /docker-compose.yml {
        deny all;
        return 404;
    }

    location = /docker-compose.override.yml {
        deny all;
        return 404;
    }

    location = /Dockerfile {
        deny all;
        return 404;
    }

    location = /Dockerfile.prod {
        deny all;
        return 404;
    }

    location = /.dockerignore {
        deny all;
        return 404;
    }

    # ── Custom Error Pages ───────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html { internal; }
    location = /50x.html { internal; }
}
